name: Provision Azure

on:
  workflow_dispatch:
    inputs:
      resource_group_name:
        description: Resource group to create or update
        required: true
        default: rg-raininggraces
      static_web_app_name:
        description: Static Web App name
        required: true
        default: swa-raininggraces-main

permissions:
  contents: read
  id-token: write

jobs:
  provision:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Azure infrastructure
        id: deploy
        shell: bash
        run: |
          az deployment sub create \
            --name "raininggraces-main-${{ github.run_id }}" \
            --location southcentralus \
            --template-file infra/main.bicep \
            --parameters infra/main.bicepparam \
            --parameters resourceGroupName="${{ inputs.resource_group_name }}" \
                         staticWebAppName="${{ inputs.static_web_app_name }}" \
                         staticWebAppRepositoryToken="${{ secrets.STATIC_WEB_APP_REPOSITORY_TOKEN }}" \
            --query properties.outputs \
            --output json > deployment-outputs.json

          hostname="$(jq -r '.staticWebAppDefaultHostname.value // empty' deployment-outputs.json)"
          api_token="$(jq -r '.staticWebAppApiToken.value // empty' deployment-outputs.json)"

          if [ -n "$api_token" ]; then
            echo "::add-mask::$api_token"
          fi

          {
            echo "static_web_app_hostname=$hostname"
          } >> "$GITHUB_OUTPUT"

      - name: Update Cloudflare DNS → Azure
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          SWA_HOSTNAME: ${{ steps.deploy.outputs.static_web_app_hostname }}
        shell: bash
        run: |
          set -euo pipefail

          upsert_cname() {
            local record_name="$1"
            local content="$2"

            response=$(curl -s -X GET \
              "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records?type=CNAME&name=${record_name}" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json")

            record_id=$(echo "$response" | jq -r '.result[0].id // empty')

            payload=$(jq -n \
              --arg type "CNAME" \
              --arg name "$record_name" \
              --arg content "$content" \
              --argjson proxied true \
              --argjson ttl 1 \
              '{type: $type, name: $name, content: $content, proxied: $proxied, ttl: $ttl}')

            if [ -n "$record_id" ]; then
              echo "Updating existing CNAME ${record_name} → ${content}"
              curl -s -X PUT \
                "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records/${record_id}" \
                -H "Authorization: Bearer ${CF_API_TOKEN}" \
                -H "Content-Type: application/json" \
                --data "$payload" | jq -r '"  status: \(.success) | \(.errors // [] | map(.message) | join(", "))"'
            else
              echo "Creating new CNAME ${record_name} → ${content}"
              curl -s -X POST \
                "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records" \
                -H "Authorization: Bearer ${CF_API_TOKEN}" \
                -H "Content-Type: application/json" \
                --data "$payload" | jq -r '"  status: \(.success) | \(.errors // [] | map(.message) | join(", "))"'
            fi
          }

          upsert_cname "raininggraces.com"     "$SWA_HOSTNAME"
          upsert_cname "www.raininggraces.com" "$SWA_HOSTNAME"

          echo "✅ DNS updated: raininggraces.com + www → $SWA_HOSTNAME"

      - name: Post provisioning summary
        shell: bash
        run: |
          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          ## Azure provisioning complete

          - Resource group: \`${{ inputs.resource_group_name }}\`
          - Static Web App: \`${{ inputs.static_web_app_name }}\`
          - Default hostname: https://${{ steps.deploy.outputs.static_web_app_hostname }}

          ### DNS

          Cloudflare CNAME records updated:
          - \`raininggraces.com\` → \`${{ steps.deploy.outputs.static_web_app_hostname }}\`
          - \`www.raininggraces.com\` → \`${{ steps.deploy.outputs.static_web_app_hostname }}\`

          ### Required follow-up

          1. Set repository secret \`AZURE_STATIC_WEB_APPS_API_TOKEN\` using the deployment token from Azure Static Web Apps.
          2. Keep using OIDC secrets \`AZURE_CLIENT_ID\`, \`AZURE_TENANT_ID\`, and \`AZURE_SUBSCRIPTION_ID\` for this provisioning workflow.

          ### Optional repo-connection bootstrap

          If you want Azure to record the GitHub repo connection at creation time, add the optional repository secret \`STATIC_WEB_APP_REPOSITORY_TOKEN\` before running this workflow.
          EOF
