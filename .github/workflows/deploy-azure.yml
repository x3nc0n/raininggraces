name: Deploy to Azure Static Web Apps + Update DNS

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Build Jekyll site
        run: bundle exec jekyll build --future

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: _site
          output_location: ""
          skip_app_build: true

      # OIDC login is needed only for the hostname lookup below.
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get SWA default hostname
        id: swa
        run: |
          hostname=$(az staticwebapp show \
            --name swa-raininggraces-main \
            --resource-group rg-raininggraces \
            --query defaultHostname \
            --output tsv)
          echo "hostname=$hostname" >> "$GITHUB_OUTPUT"
          echo "SWA hostname: $hostname"

      - name: Update Cloudflare DNS → Azure
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          SWA_HOSTNAME: ${{ steps.swa.outputs.hostname }}
        shell: bash
        run: |
          set -euo pipefail

          # Verify token works before attempting any writes.
          echo "Verifying Cloudflare token..."
          verify=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/user/tokens/verify" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json")
          if [ "$(echo "$verify" | jq -r '.success')" != "true" ]; then
            echo "❌ Cloudflare token verification failed:"
            echo "$verify" | jq -r '.errors[]?.message // .messages[]?.text // .'
            echo ""
            echo "Fix: In Cloudflare dashboard, create an API token using the"
            echo "'Edit zone DNS' template, scoped to zone raininggraces.com."
            echo "Then update the CLOUDFLARE_API_TOKEN repository secret."
            exit 1
          fi
          echo "✅ Token verified: $(echo "$verify" | jq -r '.result.status')"

          # Upsert a CNAME record: update if it exists, create if it doesn't.
          # Exits non-zero if Cloudflare returns success:false.
          upsert_cname() {
            local record_name="$1"
            local content="$2"

            response=$(curl -s -X GET \
              "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records?type=CNAME&name=${record_name}" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json")

            record_id=$(echo "$response" | jq -r '.result[0].id // empty')

            payload=$(jq -n \
              --arg type "CNAME" \
              --arg name "$record_name" \
              --arg content "$content" \
              --argjson proxied true \
              --argjson ttl 1 \
              '{type: $type, name: $name, content: $content, proxied: $proxied, ttl: $ttl}')

            if [ -n "$record_id" ]; then
              echo "Updating existing CNAME ${record_name} → ${content}"
              result=$(curl -s -X PUT \
                "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records/${record_id}" \
                -H "Authorization: Bearer ${CF_API_TOKEN}" \
                -H "Content-Type: application/json" \
                --data "$payload")
            else
              echo "Creating new CNAME ${record_name} → ${content}"
              result=$(curl -s -X POST \
                "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records" \
                -H "Authorization: Bearer ${CF_API_TOKEN}" \
                -H "Content-Type: application/json" \
                --data "$payload")
            fi

            if [ "$(echo "$result" | jq -r '.success')" != "true" ]; then
              echo "❌ Failed to upsert ${record_name}:"
              echo "$result" | jq -r '.errors[]?.message // .'
              exit 1
            fi
            echo "  ✅ ${record_name} → ${content}"
          }

          # Apex domain — Cloudflare flattens CNAME at root automatically.
          upsert_cname "raininggraces.com"     "$SWA_HOSTNAME"
          upsert_cname "www.raininggraces.com" "$SWA_HOSTNAME"

          echo "✅ DNS updated: raininggraces.com + www → $SWA_HOSTNAME"
