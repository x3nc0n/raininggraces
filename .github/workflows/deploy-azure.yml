name: Deploy to Azure Static Web Apps + Update DNS

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Build Jekyll site
        run: bundle exec jekyll build --future

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: _site
          output_location: ""
          skip_app_build: true

      # OIDC login is needed only for the hostname lookup below.
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get SWA default hostname
        id: swa
        run: |
          hostname=$(az staticwebapp show \
            --name swa-raininggraces-main \
            --resource-group rg-raininggraces \
            --query defaultHostname \
            --output tsv)
          echo "hostname=$hostname" >> "$GITHUB_OUTPUT"
          echo "SWA hostname: $hostname"

      - name: Register custom domains on Azure SWA
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        shell: bash
        run: |
          set -euo pipefail

          SWA_NAME="swa-raininggraces-main"
          RG="rg-raininggraces"
          API="https://management.azure.com/subscriptions/${AZURE_SUBSCRIPTION_ID}/resourceGroups/${RG}/providers/Microsoft.Web/staticSites/${SWA_NAME}"
          API_VER="?api-version=2023-01-01"
          TOKEN=$(az account get-access-token --resource https://management.azure.com --query accessToken --output tsv)

          # Upsert a TXT record in Cloudflare
          upsert_txt() {
            local name="$1"
            local content="$2"
            response=$(curl -s -X GET \
              "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records?type=TXT&name=${name}" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" -H "Content-Type: application/json")
            record_id=$(echo "$response" | jq -r '.result[0].id // empty')
            payload=$(jq -n --arg name "$name" --arg content "$content" \
              '{type:"TXT",name:$name,content:$content,ttl:60}')
            if [ -n "$record_id" ]; then
              curl -s -X PUT \
                "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records/${record_id}" \
                -H "Authorization: Bearer ${CF_API_TOKEN}" -H "Content-Type: application/json" \
                --data "$payload" | jq -r 'if .success then "  ✅ Updated TXT \(.result.name)" else "  ❌ \(.errors[]?.message)" end'
            else
              curl -s -X POST \
                "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records" \
                -H "Authorization: Bearer ${CF_API_TOKEN}" -H "Content-Type: application/json" \
                --data "$payload" | jq -r 'if .success then "  ✅ Created TXT \(.result.name)" else "  ❌ \(.errors[]?.message)" end'
            fi
          }

          # Set Cloudflare proxy state on a CNAME record (filters by type=CNAME to avoid CAA records)
          set_cf_proxy() {
            local name="$1"
            local proxied="$2"  # "true" or "false"
            response=$(curl -s -X GET \
              "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records?type=CNAME&name=${name}" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" -H "Content-Type: application/json")
            record_id=$(echo "$response" | jq -r '.result[0].id // empty')
            record_content=$(echo "$response" | jq -r '.result[0].content // empty')
            if [ -z "$record_id" ]; then
              echo "  ⚠️ No CNAME found for ${name} to set proxy=${proxied}"
              return
            fi
            payload=$(jq -n \
              --arg name "$name" \
              --arg content "$record_content" \
              --argjson proxied "$proxied" \
              '{type:"CNAME", name:$name, content:$content, proxied:$proxied, ttl:1}')
            curl -s -X PUT \
              "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records/${record_id}" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" -H "Content-Type: application/json" \
              --data "$payload" | jq -r 'if .success then "  ✅ proxy=\(.result.proxied) for \(.result.name)" else "  ❌ \(.errors[]?.message)" end'
          }

          # Poll Azure until validation token is available (up to 60s)
          get_domain_token() {
            local domain="$1"
            local deadline=$(( $(date +%s) + 60 ))
            while true; do
              resp=$(curl -s -X GET "${API}/customDomains/${domain}${API_VER}" \
                -H "Authorization: Bearer ${TOKEN}")
              status=$(echo "$resp" | jq -r '.properties.status // empty')
              token=$(echo "$resp" | jq -r '.properties.validationToken // empty')
              if [ -n "$token" ]; then
                echo "$token"
                return 0
              fi
              if [ "$(date +%s)" -ge "$deadline" ]; then
                echo ""
                return 1
              fi
              echo "  (status: ${status:-unknown}, waiting for token...)" >&2
              sleep 8
            done
          }

          register_domain() {
            local domain="$1"
            existing=$(curl -s -X GET "${API}/customDomains/${domain}${API_VER}" \
              -H "Authorization: Bearer ${TOKEN}" | jq -r '.properties.status // empty')

            if [ "$existing" = "Ready" ]; then
              echo "  ✅ ${domain} already validated — skipping"
              return
            fi

            echo "--- ${domain} ---"

            # Delete stuck/failed entry so Azure issues a fresh token
            if [ -n "$existing" ]; then
              echo "  Status=${existing} — deleting to reset..."
              curl -s -X DELETE "${API}/customDomains/${domain}${API_VER}" \
                -H "Authorization: Bearer ${TOKEN}" > /dev/null
              sleep 8
            fi

            # Temporarily unproxy so Azure can see the CNAME resolves to SWA
            echo "  Disabling Cloudflare proxy on ${domain} for validation window..."
            set_cf_proxy "$domain" false
            sleep 30  # allow DNS propagation

            # Create domain entry with dns-txt-token validation
            curl -s -X PUT "${API}/customDomains/${domain}${API_VER}" \
              -H "Authorization: Bearer ${TOKEN}" -H "Content-Type: application/json" \
              --data '{"properties":{"validationMethod":"dns-txt-token"}}' > /dev/null

            # Get validation token
            echo "  Waiting for Azure to issue validation token..."
            val_token=$(get_domain_token "$domain")
            if [ -z "$val_token" ]; then
              echo "  ❌ Timed out waiting for validation token"
              set_cf_proxy "$domain" true
              return 1
            fi
            echo "  Validation token: ${val_token}"

            # Set asuid TXT record
            upsert_txt "asuid.${domain}" "$val_token"
          }

          register_domain "raininggraces.com"
          register_domain "www.raininggraces.com"

          # Poll for Ready status (up to 10 min) — re-enable proxy as each domain validates
          echo ""
          echo "Polling Azure for validation status (proxy will be re-enabled when each domain is Ready)..."
          deadline=$(( $(date +%s) + 600 ))
          apex_proxied=false
          www_proxied=false
          while true; do
            apex_st=$(curl -s "${API}/customDomains/raininggraces.com${API_VER}" \
              -H "Authorization: Bearer ${TOKEN}" | jq -r '.properties.status // "unknown"')
            www_st=$(curl -s "${API}/customDomains/www.raininggraces.com${API_VER}" \
              -H "Authorization: Bearer ${TOKEN}" | jq -r '.properties.status // "unknown"')
            echo "  $(date -u '+%H:%M:%S') — raininggraces.com: ${apex_st} | www: ${www_st}"

            if [ "$apex_st" = "Ready" ] && [ "$apex_proxied" = "false" ]; then
              echo "  raininggraces.com validated — re-enabling proxy..."
              set_cf_proxy "raininggraces.com" true
              apex_proxied=true
            fi
            if [ "$www_st" = "Ready" ] && [ "$www_proxied" = "false" ]; then
              echo "  www.raininggraces.com validated — re-enabling proxy..."
              set_cf_proxy "www.raininggraces.com" true
              www_proxied=true
            fi
            if [ "$apex_st" = "Ready" ] && [ "$www_st" = "Ready" ]; then
              echo "  ✅ Both domains validated! Proxy restored."
              break
            fi
            if [ "$apex_st" = "Failed" ] || [ "$www_st" = "Failed" ]; then
              echo "  ❌ Validation failed — re-enabling proxy and exiting"
              set_cf_proxy "raininggraces.com" true
              set_cf_proxy "www.raininggraces.com" true
              exit 1
            fi
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "  ⏱ Timed out — re-enabling proxy regardless"
              set_cf_proxy "raininggraces.com" true
              set_cf_proxy "www.raininggraces.com" true
              break
            fi
            sleep 30
          done

      - name: Set Cloudflare SSL mode to Full
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        shell: bash
        run: |
          set -euo pipefail
          result=$(curl -s -X PATCH \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/settings/ssl" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"value":"full"}')
          if [ "$(echo "$result" | jq -r '.success')" = "true" ]; then
            echo "✅ Cloudflare SSL mode set to Full"
          else
            echo "⚠️ SSL mode update: $(echo "$result" | jq -r '.errors[]?.message // .')"
          fi

      - name: Update Cloudflare DNS → Azure
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          SWA_HOSTNAME: ${{ steps.swa.outputs.hostname }}
        shell: bash
        run: |
          set -euo pipefail

          # Verify token works before attempting any writes.
          echo "Verifying Cloudflare token..."
          verify=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/user/tokens/verify" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json")
          if [ "$(echo "$verify" | jq -r '.success')" != "true" ]; then
            echo "❌ Cloudflare token verification failed:"
            echo "$verify" | jq -r '.errors[]?.message // .messages[]?.text // .'
            echo ""
            echo "Fix: In Cloudflare dashboard, create an API token using the"
            echo "'Edit zone DNS' template, scoped to zone raininggraces.com."
            echo "Then update the CLOUDFLARE_API_TOKEN repository secret."
            exit 1
          fi
          echo "✅ Token verified: $(echo "$verify" | jq -r '.result.status')"

          # Confirm token can read the target zone (catches wrong Zone ID or missing Zone:Read).
          echo "Checking zone access..."
          zone_check=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json")
          if [ "$(echo "$zone_check" | jq -r '.success')" != "true" ]; then
            echo "❌ Cannot read zone ${CF_ZONE_ID}:"
            echo "$zone_check" | jq -r '.errors[]?.message // .'
            echo "Zone ID in use: ${CF_ZONE_ID}"
            echo "Fix: Token needs Zone:Zone:Read AND Zone:DNS:Edit permissions scoped to raininggraces.com"
            echo ""
            echo "Listing zones accessible with this token to find the correct Zone ID:"
            curl -s -X GET \
              "https://api.cloudflare.com/client/v4/zones?per_page=50" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json" \
              | jq -r '.result[] | "\(.name)  →  Zone ID: \(.id)"'
            exit 1
          fi
          echo "✅ Zone confirmed: $(echo "$zone_check" | jq -r '.result.name')"
          # Exits non-zero if Cloudflare returns success:false.
          upsert_cname() {
            local record_name="$1"
            local content="$2"

            response=$(curl -s -X GET \
              "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records?type=CNAME&name=${record_name}" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json")

            record_id=$(echo "$response" | jq -r '.result[0].id // empty')

            payload=$(jq -n \
              --arg type "CNAME" \
              --arg name "$record_name" \
              --arg content "$content" \
              --argjson proxied true \
              --argjson ttl 1 \
              '{type: $type, name: $name, content: $content, proxied: $proxied, ttl: $ttl}')

            if [ -n "$record_id" ]; then
              echo "Updating existing CNAME ${record_name} → ${content}"
              result=$(curl -s -X PUT \
                "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records/${record_id}" \
                -H "Authorization: Bearer ${CF_API_TOKEN}" \
                -H "Content-Type: application/json" \
                --data "$payload")
            else
              echo "Creating new CNAME ${record_name} → ${content}"
              result=$(curl -s -X POST \
                "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/dns_records" \
                -H "Authorization: Bearer ${CF_API_TOKEN}" \
                -H "Content-Type: application/json" \
                --data "$payload")
            fi

            if [ "$(echo "$result" | jq -r '.success')" != "true" ]; then
              echo "❌ Failed to upsert ${record_name}:"
              echo "$result" | jq -r '.errors[]?.message // .'
              exit 1
            fi
            echo "  ✅ ${record_name} → ${content}"
          }

          # Apex domain — Cloudflare flattens CNAME at root automatically.
          upsert_cname "raininggraces.com"     "$SWA_HOSTNAME"
          upsert_cname "www.raininggraces.com" "$SWA_HOSTNAME"

          echo "✅ DNS updated: raininggraces.com + www → $SWA_HOSTNAME"
